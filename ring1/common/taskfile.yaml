version: 3
vars:
  docker_run: docker run --rm --privileged --volume /root:/var/build nixos/nix bash -c
  skopeo_opts: --dest-tls-verify=false --override-arch=amd64 --override-os=linux
  ts_suffix:
    sh: tailscale dns status | awk '/suffix =/ {gsub(")","");print $NF}'
tasks:
  prepare-forge:
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - incus file push {{.TASKFILE_DIR}}/flatcar-install.nix forge/root/
      - incus exec forge -- apt install -y skopeo
      - incus exec forge -- docker pull nixos/nix
  #############################################################################
  # butane
  #
  create-butane-oci:
    desc: Create the butane tinkerbell action OCI image
    vars:
      image_build_commands: nix-build /var/build/butane.nix ; cat result > /var/build/butane.tar.gz
      image_name: butane
    cmds:
      - task: prepare-forge
      - incus exec forge -- {{.docker_run}} "{{.image_build_commands}}"
      - incus file pull forge/root/butane.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-butane-oci:
    desc: Push butane OCI to the registry
    vars:
      image_name: butane
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # flatcar-install
  #
  create-flatcar-install-oci:
    desc: Create the flatcar-install tinkerbell action OCI image
    vars:
      image_build_commands: nix-build /var/build/flatcar-install.nix ; cat result > /var/build/flatcar-install.tar.gz
      image_name: flatcar-install
    cmds:
      - task: prepare-forge
      - incus exec forge -- {{.docker_run}} "{{.image_build_commands}}"
      - incus file pull forge/root/flatcar-install.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-flatcar-install-oci:
    desc: Push flatcar-install OCI to the registry
    vars:
      image_name: flatcar-install
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # coreos-installer
  #
  create-coreos-installer-oci:
    desc: Create the coreos-installer tinkerbell action OCI image
    vars:
      image_build_commands: nix-build /var/build/coreos-installer.nix && cat result > /var/build/coreos-installer.tar.gz
      image_name: coreos-installer
    cmds:
      - task: prepare-forge
      - incus exec forge -- {{.docker_run}} "{{.image_build_commands}}"
      - incus file pull forge/root/{{.image_name}}.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-coreos-installer-oci:
    desc: Push coreos-installer OCI to the registry
    vars:
      image_name: coreos-installer
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # machinecfg
  #
  create-machinecfg-oci:
    desc: Create the machinecfg OCI image
    vars:
      image_names:
        - machinecfg-controller-netbox-updater
        - machinecfg-controller-kubernetes-updater
      nix_build: nix-build /var/build/machinecfg/default.nix
    cmds:
      - task: prepare-forge
      - incus exec forge -- bash -c "if [ ! -d /root/machinecfg ]; then git clone https://github.com/mgrzybek/machinecfg /root/machinecfg ;fi"
      - incus exec forge -- bash -c "cd /root/machinecfg && git pull"
      - for: {var: image_names}
        cmd: incus exec forge -- {{.docker_run}} "{{.nix_build}} -A {{.ITEM}}-oci -o oci && cat oci > /var/build/{{.ITEM}}.tar.gz && {{.nix_build}} -A {{.ITEM}}-sbom -o sbom && cp sbom/* /var/build/"
      - for: {var: image_names}
        cmd: incus file pull forge/root/{{.ITEM}}.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}-netbox-updater.tar.gz"
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}-kubernetes-updater.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}-netbox-updater.tar.gz
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}-kubernetes-updater.tar.gz
  push-machinecfg-oci:
    desc: Push machinecfg OCI to the registry
    vars:
      image_name: machinecfg-controller
      image_names:
        - "{{.image_name}}-netbox-updater"
        - "{{.image_name}}-kubernetes-updater"
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}-netbox-updater.tar.gz
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}-kubernetes-updater.tar.gz
    cmds:
      - for: {var: image_names}
        cmd: skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.ITEM}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.ITEM}}:latest
  #############################################################################
  # debootstrap
  #
  create-debootstrap-oci:
    desc: Create debootstrap OCI image
    vars:
      image_build_commands: nix-build /var/build/debootstrap.nix && cat result > /var/build/debootstrap.tar.gz
      image_name: debootstrap
    cmds:
      - task: prepare-forge
      - incus exec forge -- {{.docker_run}} "{{.image_build_commands}}"
      - incus file pull forge/root/{{.image_name}}.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
  push-debootstrap-oci:
    desc: Push debootstrap OCI to the registry
    vars:
      image_name: debootstrap
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # tpm2-tools
  #
  create-tpm2-tools-oci:
    desc: Create the tpm2-tools tinkerbell action OCI image
    vars:
      image_build_commands: nix-build /var/build/tpm2-tools.nix && cat result > /var/build/tpm2-tools.tar.gz
      image_name: tpm2-tools
    cmds:
      - task: prepare-forge
      - incus exec forge -- {{.docker_run}} "{{.image_build_commands}}"
      - incus file pull forge/root/{{.image_name}}.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-tpm2-tools-oci:
    desc: Push tpm2-tools OCI to the registry
    vars:
      image_name: tpm2-tools
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # TPM2 init template
  #
  create-tpm2-init-template:
    desc: Create the TPM2 initialization Tinkerbell template
    vars:
      jinja_opts: --strict
      jinja_variables_common: -D namespace=$NAMESPACE
      jinja_variables_tpm2: -D tpm2_pubkey_endpoint=$TPM2_PUBKEY_ENDPOINT
    preconditions:
      - sh: if [ -z $NAMESPACE ]; then return 1 ; fi
        msg: NAMESPACE should be given. Did you load your ring1 gitops variables?
      - sh: if [ -z $TPM2_PUBKEY_ENDPOINT ]; then return 1 ; fi
        msg: TPM2_PUBKEY_ENDPOINT should be given (e.g. https://vault.example.com/tpm/pubkeys)
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - jinja2 {{.jinja_opts}} {{.jinja_variables_common}} {{.jinja_variables_tpm2}} -o dist/tpm2-init-template.yaml tpm2-init-template.yaml.j2
      - kubectl apply -f dist/tpm2-init-template.yaml
  #############################################################################
  # Flatcar linux
  #
  create-basic-flatcar-install-template:
    desc: Create a basic Flatcar Linux installation template
    vars:
      butane_system_base64:
        sh: base64 -i flatcar-butane.yaml
      butane_merge_base64:
        sh: base64 -i flatcar-merge.yaml
      jinja_opts: --strict
      jinja_variables_common: -D namespace=$NAMESPACE
      jinja_variables_ignition: -D butane_system_base64={{.butane_system_base64}} -D butane_merge_base64={{.butane_merge_base64}}
    preconditions:
      - sh: if [ -z $NAMESPACE ]; then return 1 ; fi
        msg: NAMESPACE should be given. Did you load your ring1 gitops variables?
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - jinja2 {{.jinja_opts}} {{.jinja_variables_common}} {{.jinja_variables_ignition}} -o dist/flatcar-install-template.yaml flatcar-install-template.yaml.j2
      - kubectl apply -f dist/flatcar-install-template.yaml
