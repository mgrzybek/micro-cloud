version: 3
vars:
  skopeo_opts: --dest-tls-verify=false --override-arch=amd64 --override-os=linux
  ts_suffix:
    sh: tailscale dns status | awk '/suffix =/ {gsub(")","");print $NF}'
tasks:
  #############################################################################
  # butane
  #
  create-butane-oci:
    desc: Create the butane tinkerbell action OCI image
    vars:
      image_build_commands: nix-build /var/build/butane.nix ; cat result > /var/build/butane.tar.gz
      image_name: butane
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - incus file push {{.TASKFILE_DIR}}/butane.nix forge/root/
      - incus exec forge -- apt install -y skopeo
      - incus exec forge -- docker pull nixos/nix
      - incus exec forge -- docker run --privileged --volume /root:/var/build nixos/nix bash -c "{{.image_build_commands}}"
      - incus file pull forge/root/butane.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-butane-oci:
    desc: Push butane OCI to the registry
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    vars:
      image_name: butane
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # flatcar-install
  #
  create-flatcar-install-oci:
    desc: Create the flatcar-install tinkerbell action OCI image
    vars:
      image_build_commands: nix-build /var/build/flatcar-install.nix ; cat result > /var/build/flatcar-install.tar.gz
      image_name: flatcar-install
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - incus file push {{.TASKFILE_DIR}}/flatcar-install.nix forge/root/
      - incus exec forge -- apt install -y skopeo
      - incus exec forge -- docker pull nixos/nix
      - incus exec forge -- docker run --privileged --volume /root:/var/build nixos/nix bash -c "{{.image_build_commands}}"
      - incus file pull forge/root/flatcar-install.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-flatcar-install-oci:
    desc: Push flatcar-install OCI to the registry
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    vars:
      image_name: flatcar-install
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # coredns
  #
  create-coredns-oci:
    desc: Create the coredns OCI image
    vars:
      image_build_commands: nix-build /var/build/coredns.nix ; cat result > /var/build/coredns.tar.gz
      image_name: coredns
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - incus file push {{.TASKFILE_DIR}}/coredns.nix forge/root/
      - incus exec forge -- apt install -y skopeo
      - incus exec forge -- docker pull nixos/nix
      - incus exec forge -- docker run --privileged --volume /root:/var/build nixos/nix bash -c "{{.image_build_commands}}"
      - incus file pull forge/root/coredns.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-coredns-oci:
    desc: Push coredns OCI to the registry
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    vars:
      image_name: coredns
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  update-coredns:
    desc: Update CoreDNS version and hashes in coredns.nix (requires VERSION env var)
    preconditions:
      - sh: if [ -z $VERSION ]; then return 1 ; fi
        msg: VERSION must be set (e.g. export VERSION=1.13.2)
      - sh: |
          current=$(awk -F'"' '/version =/ { print $2; exit }' {{.TASKFILE_DIR}}/coredns.nix)
          [ "$current" != "$VERSION" ]
        msg: VERSION $VERSION is already the current version in coredns.nix
    vars:
      fake_hash: sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      sed_cmd:
        sh: if [[ "$(uname)" == "Darwin" ]]; then echo gsed; else echo sed; fi
    cmds:
      # 1. Bump version, reset both hashes to fakeHash to trigger mismatch errors
      - |
        {{.sed_cmd}} -i \
          -e 's/version = "[^"]*"/version = "'"$VERSION"'"/' \
          -e 's|sha256 = "sha256-[^"]*"|sha256 = "{{.fake_hash}}"|' \
          -e 's|vendorHash = "sha256-[^"]*"|vendorHash = "{{.fake_hash}}"|' \
          {{.TASKFILE_DIR}}/coredns.nix
      # 2. Push coredns.nix to forge for first build pass
      - incus file push {{.TASKFILE_DIR}}/coredns.nix forge/root/
      # 3. First pass: extract correct sha256 for the source tarball
      - |
        NEW_SHA256=$(incus exec forge -- \
          docker run --privileged --volume /root:/var/build nixos/nix \
          bash -c "nix-build /var/build/coredns.nix 2>&1 || true" \
          | awk '/got:/ { print $NF; exit }')
        test -n "$NEW_SHA256" \
          || { echo "ERROR: could not extract sha256 from first build pass" >&2 ; exit 1 ; }
        {{.sed_cmd}} -i \
          -e 's|sha256 = "sha256-[^"]*"|sha256 = "'"$NEW_SHA256"'"|' \
          {{.TASKFILE_DIR}}/coredns.nix
      # 4. Push updated coredns.nix for second build pass
      - incus file push {{.TASKFILE_DIR}}/coredns.nix forge/root/
      # 5. Second pass: extract correct vendorHash for Go modules
      - |
        NEW_VENDOR_HASH=$(incus exec forge -- \
          docker run --privileged --volume /root:/var/build nixos/nix \
          bash -c "nix-build /var/build/coredns.nix 2>&1 || true" \
          | awk '/got:/ { print $NF; exit }')
        test -n "$NEW_VENDOR_HASH" \
          || { echo "ERROR: could not extract vendorHash from second build pass" >&2 ; exit 1 ; }
        {{.sed_cmd}} -i \
          -e 's|vendorHash = "sha256-[^"]*"|vendorHash = "'"$NEW_VENDOR_HASH"'"|' \
          {{.TASKFILE_DIR}}/coredns.nix
  #############################################################################
  # coreos-installer
  #
  create-coreos-installer-oci:
    desc: Create the coreos-installer tinkerbell action OCI image
    vars:
      image_build_commands: nix-build /var/build/coreos-installer.nix && cat result > /var/build/coreos-installer.tar.gz
      image_name: coreos-installer
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - incus file push {{.TASKFILE_DIR}}/{{.image_name}}.nix forge/root/
      - incus exec forge -- apt install -y skopeo
      - incus exec forge -- docker pull nixos/nix
      - incus exec forge -- docker run --privileged --volume /root:/var/build nixos/nix bash -c "{{.image_build_commands}}"
      - incus file pull forge/root/{{.image_name}}.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-coreos-installer-oci:
    desc: Push coreos-installer OCI to the registry
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    vars:
      image_name: coreos-installer
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # machinecfg
  #
  create-machinecfg-oci:
    desc: Create the machinecfg OCI image
    vars:
      image_build_commands: nix-build /var/build/machinecfg.nix ; cat result > /var/build/machinecfg.tar.gz
      image_name: machinecfg
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - incus file push {{.TASKFILE_DIR}}/machinecfg.nix forge/root/
      - incus exec forge -- apt install -y skopeo
      - incus exec forge -- docker pull nixos/nix
      - incus exec forge -- docker run --privileged --volume /root:/var/build nixos/nix bash -c "{{.image_build_commands}}"
      - incus file pull forge/root/machinecfg.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    sources:
      - "{{.TASKFILE_DIR}}/{{.image_name}}.nix"
  push-machinecfg-oci:
    desc: Push machinecfg OCI to the registry
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    vars:
      image_name: machinecfg
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # debootstrap
  #
  create-debootstrap-oci:
    desc: Create debootstrap OCI image
    vars:
      image_build_commands: nix-build /var/build/debootstrap.nix && cat result > /var/build/debootstrap.tar.gz
      image_name: debootstrap
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - incus file push {{.TASKFILE_DIR}}/{{.image_name}}.nix forge/root/
      - incus exec forge -- apt install -y skopeo
      - incus exec forge -- docker pull nixos/nix
      - incus exec forge -- docker run --privileged --volume /root:/var/build nixos/nix bash -c "{{.image_build_commands}}"
      - incus file pull forge/root/{{.image_name}}.tar.gz {{.TASKFILE_DIR}}/dist/
    generates:
      - "{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz"
    status:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
  push-debootstrap-oci:
    desc: Push debootstrap OCI to the registry
    preconditions:
      - test -f {{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz
    vars:
      image_name: debootstrap
    cmds:
      - skopeo copy {{.skopeo_opts}} docker-archive:{{.TASKFILE_DIR}}/dist/{{.image_name}}.tar.gz docker://registry.{{.ts_suffix}}:443/{{.image_name}}:latest
  #############################################################################
  # Flatcar linux
  #
  create-basic-flatcar-install-template:
    desc: Create a basic Flatcar Linux installation template
    preconditions:
      - sh: if [ -z $NAMESPACE ]; then return 1 ; fi
        msg: NAMESPACE should be given. Did you load your ring1 gitops variables?
    vars:
      butane_system_base64:
        sh: base64 -i flatcar-butane.yaml
      butane_merge_base64:
        sh: base64 -i flatcar-merge.yaml
      jinja_opts: --strict
      jinja_variables_common: -D namespace=$NAMESPACE
      jinja_variables_ignition: -D butane_system_base64={{.butane_system_base64}} -D butane_merge_base64={{.butane_merge_base64}}
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/dist
      - jinja2 {{.jinja_opts}} {{.jinja_variables_common}} {{.jinja_variables_ignition}} -o dist/flatcar-install-template.yaml flatcar-install-template.yaml.j2
      - kubectl apply -f dist/flatcar-install-template.yaml
