version: 3
vars:
  ts_suffix:
    sh: tailscale dns status | awk '/suffix =/ {gsub(")","");print $NF}'
  skopeo_opts: --dest-tls-verify=false --override-arch=amd64 --override-os=linux
tasks:
##
## Bootstrap
##
  intermediate-fullchain:
    desc: Deploy the PKI and creates the root CA
    cmd: bash ./scripts/deploy-pki.sh
    generates: [dist/intermediate-fullchain.pem]

  bootstrap:
    desc: Deploy the bootstrap instance
    deps: [intermediate-fullchain]
    cmd: bash ./scripts/deploy-bootstrap.sh

  forge:
    desc: Deploy the forge instance
    cmd: bash ./scripts/deploy-forge.sh

##
## Platform
##
  management:
    desc: Deploy the management instance
    prompt:
    - You should read https://tailscale.com/kb/1236/kubernetes-operator. Is it OK?
    cmd: RING0_ROOT=$PWD bash ./scripts/deploy-management.sh

  idp:
    desc: Deploy the IDP using Helm
    prompt: You should have a look at https://idp.{{.ts_suffix}}/if/flow/initial-setup/ for post-deployment configuration. Right?
    cmd: bash ./scripts/deploy-idp.sh

  cmdb:
    desc: Deploy the CMDB using Helm
    cmd: bash ./scripts/deploy-cmdb.sh

  bmaas:
    desc: Deploy the BMaaS and the OCI registry using helm
    cmds:
      - bash ./scripts/deploy-bmaas.sh
      - task: install-coredns

  install-coredns:
    desc: Install CoreDNS with Netbox plugin into the BMaaS namespace
    deps: [push-coredns-oci]
    vars:
      coredns_version:
        sh: awk -F'"' '/version =/ { print $2; exit }' ./core-services/forge/coredns.nix
    preconditions:
      - sh: test -n "${BMAAS_NAMESPACE:-}"
        msg: BMAAS_NAMESPACE must be defined
      - sh: test -n "${DNS_IP:-}"
        msg: DNS_IP must be defined
      - sh: test -n "{{.ts_suffix}}"
        msg: ts_suffix could not be determined from tailscale dns status
      - sh: test -n "{{.coredns_version}}"
        msg: coredns version could not be determined from coredns.nix
    status:
      - kubectl get deployment --namespace "$BMAAS_NAMESPACE" coredns >/dev/null 2>&1
    cmds:
      - mkdir -p ./dist
      - |
        if [ -z "${COREDNS_NETBOX_TOKEN:-}" ]; then
          coredns_netbox_token="$(cat ./dist/coredns.token)"
        else
          coredns_netbox_token="$COREDNS_NETBOX_TOKEN"
        fi
        if ! echo -n "$coredns_netbox_token" | wc -c | awk '$1 == 40 {print "ok"}' | grep -q ok; then
          echo "No valid Netbox token found. '$coredns_netbox_token' is not 40-character long."
          exit 1
        fi
        jinja2 --strict \
          -D "namespace=$BMAAS_NAMESPACE" \
          -D "coredns_netbox_token=$coredns_netbox_token" \
          -D "coredns_ip=$DNS_IP" \
          -D "ts_suffix={{.ts_suffix}}" \
          -D "version=v{{.coredns_version}}" \
          ./core-services/management/manifests/05-coredns.yaml.j2 \
          -o ./dist/coredns.yaml
      - kubectl apply --wait --namespace "$BMAAS_NAMESPACE" -f ./dist/coredns.yaml

##
## Dangerous tasks
##
  destroy-management:
    desc: Destroy the management instance
    prompt:
      - This is a dangerous command... Do you want to continue?
      - Are you sure?
    cmds:
      - if incus list | grep -q management ; then incus delete -f management ; else echo management instance already deleted ; fi
      - rm -f dist/controlplane.yaml dist/worker.yaml dist/talosconfig dist/cp-patch.yaml dist/patch.yaml dist/authentik-values.yaml
      - kubectl config delete-context admin@management

  dist-clean:
    desc: Removes the distribution artifacts
    prompt:
      - This is a dangerous command... Do you want to continue?
      - Are you sure?
    dir: '{{.USER_WORKING_DIR}}/dist'
    cmd: rm -rf *

##
## Day 2 operations
##
  update-kamaji:
    desc: Update Kamaji CRDs and manifests from the official repository and apply to the cluster
    vars:
      manifests_dir: ./core-services/management/manifests/05-kamaji
      kamaji_dir: ./dist/kamaji
      helm_set: >-
        --namespace kamaji-system
        --set defaultDatastoreName=microcloud
        --set "kamaji-etcd.deploy=false"
        --set serviceMonitor.enabled=false
      sed:
        sh: if [[ "$(uname)" == "Darwin" ]]; then echo gsed; else echo sed; fi 
    cmds:
      - |
        if [ ! -d {{.kamaji_dir}}/.git ]; then
          git clone https://github.com/clastix/kamaji.git {{.kamaji_dir}}
        fi
      - git -C {{.kamaji_dir}} fetch --tags
      - git -C {{.kamaji_dir}} checkout $(git -C {{.kamaji_dir}} tag | grep edge | tail -n1)
      - helm dependency build {{.kamaji_dir}}/charts/kamaji
      - helm template kamaji-crds {{.kamaji_dir}}/charts/kamaji-crds | yq > {{.manifests_dir}}/crds.yaml
      - |
        helm template kamaji {{.kamaji_dir}}/charts/kamaji {{.helm_set}} \
          --show-only templates/rbac.yaml \
          | grep -v "^# Source:" | yq > {{.manifests_dir}}/rbacs.yaml
      - |
        { helm template kamaji {{.kamaji_dir}}/charts/kamaji {{.helm_set}} \
            --show-only templates/service_metrics.yaml
          helm template kamaji {{.kamaji_dir}}/charts/kamaji {{.helm_set}} \
            --show-only templates/service_webhook.yaml
        } | grep -v "^# Source:" | yq > {{.manifests_dir}}/services.yaml
      - |
        { helm template kamaji {{.kamaji_dir}}/charts/kamaji {{.helm_set}} \
            --show-only templates/certmanager_issuer.yaml
          helm template kamaji {{.kamaji_dir}}/charts/kamaji {{.helm_set}} \
            --show-only templates/certmanager_certificate.yaml
        } | grep -v "^# Source:" | yq > {{.manifests_dir}}/certificate.yaml
      - |
        { helm template kamaji {{.kamaji_dir}}/charts/kamaji {{.helm_set}} \
            --show-only templates/mutatingwebhookconfiguration.yaml
          helm template kamaji {{.kamaji_dir}}/charts/kamaji {{.helm_set}} \
            --show-only templates/validatingwebhookconfiguration.yaml
        } | grep -v "^# Source:" | yq > {{.manifests_dir}}/webhook-configs.yaml
      - |
          KAMAJI_VERSION=$(git -C {{.kamaji_dir}} tag | grep edge | tail -n1)
          {{.sed}} -i -E "s,image: .+,image: \"clastix/kamaji:$KAMAJI_VERSION\"," {{.manifests_dir}}/deployment.yaml

      - kubectl apply --server-side --force-conflicts -f {{.manifests_dir}}/crds.yaml
      - kubectl apply -f {{.manifests_dir}}/namespace.yaml
      - kubectl apply -f {{.manifests_dir}}/rbacs.yaml
      - kubectl apply -f {{.manifests_dir}}/services.yaml
      - kubectl apply -f {{.manifests_dir}}/certificate.yaml
      - kubectl apply -f {{.manifests_dir}}/webhook-configs.yaml
      - kubectl apply -f {{.manifests_dir}}/deployment.yaml

  update-flatcar-repo:
    desc: Download the latest version of Flatcar Linux artifacts and set the current symlink
    cmd: cat ./core-services/bootstrap/update-flatcar-repo.sh | incus exec bootstrap bash --

  create-coredns-oci:
    desc: Build the CoreDNS OCI image (with Netbox plugin) on the forge instance
    vars:
      nix_file: ./core-services/forge/coredns.nix
      image_build_commands: nix-build /var/build/coredns.nix ; cat result > /var/build/coredns.tar.gz
    cmds:
      - mkdir -p ./dist
      - incus file push {{.nix_file}} forge/root/coredns.nix
      - incus exec forge -- docker pull nixos/nix
      - incus exec forge -- docker run --rm --privileged --volume /root:/var/build nixos/nix bash -c "{{.image_build_commands}}"
      - incus file pull forge/root/coredns.tar.gz ./dist/coredns.tar.gz
    generates:
      - ./dist/coredns.tar.gz
    status:
      - test -f ./dist/coredns.tar.gz
    sources:
      - ./core-services/forge/coredns.nix

  push-coredns-oci:
    desc: Push the CoreDNS OCI image to the internal registry
    preconditions:
      - sh: test -f ./dist/coredns.tar.gz
        msg: coredns.tar.gz not found — run create-coredns-oci first
    cmds:
      - |
        version=$(skopeo inspect docker-archive:./dist/coredns.tar.gz | jq -r ".Labels.version")
        skopeo copy {{.skopeo_opts}} docker-archive:./dist/coredns.tar.gz docker://registry.{{.ts_suffix}}:443/coredns:v$version

  update-coredns:
    desc: Update CoreDNS version and hashes in coredns.nix (requires VERSION env var)
    vars:
      nix_file: ./core-services/forge/coredns.nix
      fake_hash: sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      sed_cmd:
        sh: if [[ "$(uname)" == "Darwin" ]]; then echo gsed; else echo sed; fi
    preconditions:
      - sh: if [ -z $VERSION ]; then return 1 ; fi
        msg: VERSION must be set (e.g. export VERSION=1.14.0)
      - sh: |
          current=$(awk -F'"' '/version =/ { print $2; exit }' ./core-services/forge/coredns.nix)
          [ "$current" != "$VERSION" ]
        msg: VERSION $VERSION is already the current version in coredns.nix
    cmds:
      # 1. Bump version, reset both hashes to fakeHash to trigger mismatch errors
      - |
        {{.sed_cmd}} -i \
          -e 's/version = "[^"]*"/version = "'"$VERSION"'"/' \
          -e 's|sha256 = "sha256-[^"]*"|sha256 = "{{.fake_hash}}"|' \
          -e 's|vendorHash = "sha256-[^"]*"|vendorHash = "{{.fake_hash}}"|' \
          {{.nix_file}}
      # 2. Push coredns.nix to forge for first build pass
      - incus file push {{.nix_file}} forge/root/coredns.nix
      # 3. First pass: extract correct sha256 for the source tarball
      - |
        NEW_SHA256=$(incus exec forge -- \
          docker run --rm --privileged --volume /root:/var/build nixos/nix \
          bash -c "nix-build /var/build/coredns.nix 2>&1 || true" \
          | awk '/got:/ { print $NF; exit }')
        test -n "$NEW_SHA256" \
          || { echo "ERROR: could not extract sha256 from first build pass" >&2 ; exit 1 ; }
        {{.sed_cmd}} -i \
          -e 's|sha256 = "sha256-[^"]*"|sha256 = "'"$NEW_SHA256"'"|' \
          {{.nix_file}}
      # 4. Push updated coredns.nix for second build pass
      - incus file push {{.nix_file}} forge/root/coredns.nix
      # 5. Second pass: extract correct vendorHash for Go modules
      - |
        NEW_VENDOR_HASH=$(incus exec forge -- \
          docker run --rm --privileged --volume /root:/var/build nixos/nix \
          bash -c "nix-build /var/build/coredns.nix 2>&1 || true" \
          | awk '/got:/ { print $NF; exit }')
        test -n "$NEW_VENDOR_HASH" \
          || { echo "ERROR: could not extract vendorHash from second build pass" >&2 ; exit 1 ; }
        {{.sed_cmd}} -i \
          -e 's|vendorHash = "sha256-[^"]*"|vendorHash = "'"$NEW_VENDOR_HASH"'"|' \
          {{.nix_file}}